<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #eef2f5; font-family: sans-serif; }
        .preview-pane { height: 90vh; background: #525659; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .card-select { cursor: pointer; border: 2px solid transparent; padding: 10px; background: white; border-radius: 8px; text-align: center; }
        .card-select.active { border-color: #0d6efd; background-color: #eff6ff; color: #0d6efd; font-weight: bold; }
    </style>
</head>
<body class="p-4">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3">
                <h5 class="mb-3">Invoice Generator</h5>
                <div class="card p-3 mb-3">
                    <label class="form-label small text-muted font-weight-bold">TEMPLATE</label>
                    <div class="row g-2">
                        <div class="col-6"><div class="card-select active" onclick="setTemplate('zoho_blue', this)">Blue</div></div>
                        <div class="col-6"><div class="card-select" onclick="setTemplate('stripe_minimal', this)">Minimal</div></div>
                        <div class="col-12 mt-2"><div class="card-select" onclick="setTemplate('enterprise_teal', this)">Teal Corp</div></div>
                    </div>
                </div>
                <div class="card p-3 mb-3">
                     <button type="button" class="btn btn-danger w-100 mb-2" onclick="stressTest()">🔥 Stress Test (60 Items)</button>
                     <button type="button" class="btn btn-primary w-100 mb-2" onclick="updatePreview()">Refresh Preview</button>
                     <button type="button" class="btn btn-dark w-100" onclick="downloadPdf()">Download PDF</button>
                </div>
            </div>
            <div class="col-md-9"><div class="preview-pane"><iframe id="pdfPreview"></iframe></div></div>
        </div>
    </div>
    <script>
        let currentTemplate = 'zoho_blue';
        let items = [{desc: "Consulting", hsn: "998314", qty: 1, rate: 5000}];

        function setTemplate(name, el) { 
            currentTemplate = name; 
            document.querySelectorAll('.card-select').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            updatePreview();
        }

        function stressTest() {
            items = [];
            for(let i=1; i<=60; i++) {
                let desc = `Service Item ${i}`;
                if(i%5===0) desc += " - Detailed analysis of system architecture and compliance review.";
                items.push({desc: desc, hsn: "9983", qty: 1, rate: parseFloat((Math.random()*100).toFixed(2))});
            }
            updatePreview();
        }

        function getPayload() {
            return {
                template_style: currentTemplate,
                invoice_number: "INV-001", date: "2026-02-05", due_date: "2026-03-05",
                company: { name: "ALPHABIT TECHNOLOGIES", address: "Chennai, India", tax_id: "GST123" },
                customer: { name: "ACME CORP", address: "Mumbai, India", gstin: "GST999" },
                bank: { bank_name: "AXIS BANK", account_no: "123456", ifsc: "UTIB0001" },
                items: items, tax_rate: 18
            };
        }

        async function updatePreview() {
            const res = await fetch('/preview', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(getPayload()) });
            const blob = await res.blob();
            document.getElementById('pdfPreview').src = window.URL.createObjectURL(blob);
        }
        async function downloadPdf() {
            const res = await fetch('/download', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(getPayload()) });
            const blob = await res.blob();
            const a = document.createElement('a'); a.href = window.URL.createObjectURL(blob); a.download="invoice.pdf"; a.click();
        }
        window.onload = updatePreview;
    </script>
</body>
</html>
