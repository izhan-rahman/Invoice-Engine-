# ============================================================
# nginx.conf — Nginx reverse proxy config for the PDF engine
# Place this at: /etc/nginx/sites-available/invoice-engine
# Then enable:   sudo ln -s /etc/nginx/sites-available/invoice-engine /etc/nginx/sites-enabled/
# Reload:        sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_SERVER_IP;  # <-- Replace with your actual IP or domain

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Increase max body size for larger invoice payloads
    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # PDF generation can take a few seconds
        proxy_send_timeout 120s;
    }

    # Optional: serve static files directly from Nginx for better performance
    # location /static/ {
    #     alias /path/to/your/project/app/static/;
    # }

    # Gzip for API responses (not for PDF binaries)
    gzip on;
    gzip_types text/plain application/json text/html;
}

