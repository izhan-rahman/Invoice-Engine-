version: '3.9'

services:
  invoice-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoice-engine
    restart: unless-stopped
    ports:
      # HOST_PORT:CONTAINER_PORT
      # Change the left side if port 8000 is already in use on your server
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=production
    # Uncomment to persist generated PDFs or share logs with host
    # volumes:
    #   - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
